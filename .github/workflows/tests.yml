name: QA Tests (Flask + Playwright)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright flask gunicorn

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps

      - name: Start Flask app
        run: |
          gunicorn dev.main:app --bind 127.0.0.1:5002 &
          sleep 5

      - name: Run QA tests
        run: |
          pytest qa/tests --log-cli-level=INFO --html=report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html