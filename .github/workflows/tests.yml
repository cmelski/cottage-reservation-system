name: QA Tests (Flask + Playwright)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Create database schema
        run: |
          python -c "from dev.db.db_create import create_table; create_table()"

      - name: Start Flask app
        run: |
          gunicorn dev.main:app --bind 127.0.0.1:5002 &
          until curl -s http://127.0.0.1:5002 > /dev/null; do
            echo "Waiting for Flask..."
            sleep 1
          done

      - name: Run QA tests
        run: |
          python -m pytest qa/tests --log-cli-level=INFO --html=report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html

      - name: Dump DB contents
        if: always()
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -c "SELECT * FROM booking;"